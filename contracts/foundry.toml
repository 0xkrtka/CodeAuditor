[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.20"
optimizer       = true
optimizer_runs  = 200
via_ir          = false

[rpc_endpoints]
ritual = "https://rpc.ritualfoundation.org"
local  = "http://127.0.0.1:8545"

[etherscan]
ritual = { key = "noop", url = "https://explorer.ritualfoundation.org/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true

[fuzz]
runs = 256

[invariant]
runs   = 64
depth  = 15
